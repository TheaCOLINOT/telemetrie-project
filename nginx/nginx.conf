events {}

http {

    upstream glitchtip_backend {
        server glitchtip:8000;
    }

    upstream umami_backend {
        server umami:3000;
    }

    server {
        listen 80;

        location /glitchtip/ {
            proxy_pass http://glitchtip_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /analytics/ {
            proxy_pass http://umami_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
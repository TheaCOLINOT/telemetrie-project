services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

  glitchtip:
    image: glitchtip/glitchtip:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_URL: postgres://postgres:secret_password@postgres:5432/glitchtip
      SECRET_KEY: un_tres_long_secret_aleatoire_ici
      GLITCHTIP_DOMAIN: http://localhost:8000
      ENABLE_REGISTRATION: "True"
    volumes:
      - uploads:/code/uploads

  umami-db:
    image: postgres:15-alpine
    container_name: umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami_password
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami_password@umami-db:5432/umami
      APP_SECRET: un_secret_umami_aleatoire_ici
    depends_on:
      umami-db:
        condition: service_healthy

volumes:
  postgres-data:
  uploads:
  umami-db-data:

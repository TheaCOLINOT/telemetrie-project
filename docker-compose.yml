services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

  glitchtip:
    image: glitchtip/glitchtip:latest
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_URL: postgres://postgres:secret_password@postgres:5432/glitchtip
      SECRET_KEY: un_tres_long_secret_aleatoire_ici
      GLITCHTIP_DOMAIN: http://localhost:8000
      ENABLE_REGISTRATION: "True"
    volumes:
      - uploads:/code/uploads

volumes:
  postgres-data:
  uploads:
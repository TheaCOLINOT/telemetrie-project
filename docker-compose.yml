name: shophub-telemetrie

# ─────────────────────────────────────────────────────────────────
#  Variables partagées Glitchtip
# ─────────────────────────────────────────────────────────────────
x-glitchtip-env: &glitchtip-env
  DATABASE_URL: postgresql://glitchtip:glitchtip@glitchtip-db:5432/glitchtip
  REDIS_URL: redis://glitchtip-redis:6379/0
  SECRET_KEY: changeme-remplacer-par-une-chaine-aleatoire-longue
  PORT: 8000
  EMAIL_URL: consolemail://
  GLITCHTIP_DOMAIN: http://localhost:8000
  DEFAULT_FROM_EMAIL: noreply@shophub.local
  CELERY_WORKER_AUTOSCALE: "1,3"
  CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"

services:

  # ──────────────────────────────────────────
  #  UMAMI — Analytics
  #  UI  → http://localhost:3000
  #  Login par défaut : admin / umami
  # ──────────────────────────────────────────
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: shophub-umami
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: changeme-remplacer-par-une-chaine-aleatoire
    depends_on:
      umami-db:
        condition: service_healthy
    restart: unless-stopped

  umami-db:
    image: postgres:16-alpine
    container_name: shophub-umami-db
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami
    volumes:
      - umami_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ──────────────────────────────────────────
  #  GLITCHTIP — Error tracking (Sentry-compatible)
  #  UI  → http://localhost:8000
  #  Créer un compte via l'interface au premier lancement
  # ──────────────────────────────────────────
  glitchtip-web:
    image: glitchtip/glitchtip
    container_name: shophub-glitchtip-web
    ports:
      - "8000:8000"
    environment:
      <<: *glitchtip-env
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_started
    restart: unless-stopped

  glitchtip-worker:
    image: glitchtip/glitchtip
    container_name: shophub-glitchtip-worker
    command: ./bin/run-celery-with-beat.sh
    environment:
      <<: *glitchtip-env
    depends_on:
      - glitchtip-db
      - glitchtip-redis
    restart: unless-stopped

  glitchtip-migrate:
    image: glitchtip/glitchtip
    container_name: shophub-glitchtip-migrate
    command: ./manage.py migrate
    environment:
      <<: *glitchtip-env
    depends_on:
      glitchtip-db:
        condition: service_healthy
    restart: on-failure

  glitchtip-db:
    image: postgres:16-alpine
    container_name: shophub-glitchtip-db
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: glitchtip
    volumes:
      - glitchtip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  glitchtip-redis:
    image: redis:7-alpine
    container_name: shophub-glitchtip-redis
    restart: unless-stopped

volumes:
  umami_db_data:
  glitchtip_db_data:
